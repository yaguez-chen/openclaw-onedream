<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="hubGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00B4D8"/>
      <stop offset="100%" style="stop-color:#48CAE4"/>
    </linearGradient>
  </defs>
  <!-- 背景圆 -->
  <circle cx="100" cy="100" r="90" fill="#00B4D8" opacity="0.06"/>
  <circle cx="100" cy="100" r="85" fill="none" stroke="#00B4D8" stroke-width="3"/>
  
  <!-- 外围信号波 -->
  <g fill="none" stroke="#48CAE4" stroke-width="2" opacity="0.4">
    <circle cx="100" cy="100" r="70"/>
    <circle cx="100" cy="100" r="58">
      <animate attributeName="r" values="58;62;58" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.2;0.4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="100" r="48">
      <animate attributeName="r" values="48;52;48" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.3;0.5" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- 中心枢纽 -->
  <circle cx="100" cy="100" r="18" fill="url(#hubGrad)" stroke="#0096C7" stroke-width="2"/>
  <circle cx="100" cy="100" r="8" fill="white" opacity="0.6"/>
  
  <!-- 连接节点 -->
  <!-- 上 -->
  <circle cx="100" cy="50" r="10" fill="#48CAE4" stroke="#0096C7" stroke-width="1.5"/>
  <line x1="100" y1="60" x2="100" y2="82" stroke="#00B4D8" stroke-width="2"/>
  
  <!-- 右上 -->
  <circle cx="148" cy="70" r="10" fill="#48CAE4" stroke="#0096C7" stroke-width="1.5"/>
  <line x1="140" y1="76" x2="115" y2="88" stroke="#00B4D8" stroke-width="2"/>
  
  <!-- 右下 -->
  <circle cx="148" cy="130" r="10" fill="#48CAE4" stroke="#0096C7" stroke-width="1.5"/>
  <line x1="140" y1="124" x2="115" y2="112" stroke="#00B4D8" stroke-width="2"/>
  
  <!-- 下 -->
  <circle cx="100" cy="150" r="10" fill="#48CAE4" stroke="#0096C7" stroke-width="1.5"/>
  <line x1="100" y1="140" x2="100" y2="118" stroke="#00B4D8" stroke-width="2"/>
  
  <!-- 左下 -->
  <circle cx="52" cy="130" r="10" fill="#48CAE4" stroke="#0096C7" stroke-width="1.5"/>
  <line x1="60" y1="124" x2="85" y2="112" stroke="#00B4D8" stroke-width="2"/>
  
  <!-- 左上 -->
  <circle cx="52" cy="70" r="10" fill="#48CAE4" stroke="#0096C7" stroke-width="1.5"/>
  <line x1="60" y1="76" x2="85" y2="88" stroke="#00B4D8" stroke-width="2"/>
  
  <!-- 底部文字 -->
  <text x="100" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0096C7">协调层</text>
</svg>