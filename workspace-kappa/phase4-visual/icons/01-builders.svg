<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="builderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#FF8C42"/>
    </linearGradient>
  </defs>
  <!-- 背景圆 -->
  <circle cx="100" cy="100" r="90" fill="#2D3142" opacity="0.1"/>
  <circle cx="100" cy="100" r="85" fill="none" stroke="#FF6B35" stroke-width="3"/>
  
  <!-- 齿轮 -->
  <g transform="translate(80,75)" fill="#2D3142">
    <circle cx="20" cy="20" r="12" fill="none" stroke="#2D3142" stroke-width="4"/>
    <rect x="17" y="0" width="6" height="8" rx="1"/>
    <rect x="17" y="32" width="6" height="8" rx="1"/>
    <rect x="0" y="17" width="8" height="6" rx="1"/>
    <rect x="32" y="17" width="8" height="6" rx="1"/>
    <rect x="4" y="4" width="6" height="6" rx="1" transform="rotate(45 7 7)"/>
    <rect x="30" y="4" width="6" height="6" rx="1" transform="rotate(45 33 7)"/>
    <rect x="4" y="30" width="6" height="6" rx="1" transform="rotate(45 7 33)"/>
    <rect x="30" y="30" width="6" height="6" rx="1" transform="rotate(45 33 33)"/>
  </g>
  
  <!-- 画笔 -->
  <g transform="translate(95,55) rotate(45)" fill="url(#builderGrad)">
    <rect x="3" y="0" width="6" height="35" rx="2"/>
    <path d="M0,35 L9,35 L4.5,50 Z" fill="#FF6B35"/>
    <rect x="1" y="8" width="10" height="3" rx="1" fill="#2D3142" opacity="0.3"/>
  </g>
  
  <!-- 底部文字 -->
  <text x="100" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2D3142">建设者联盟</text>
</svg>