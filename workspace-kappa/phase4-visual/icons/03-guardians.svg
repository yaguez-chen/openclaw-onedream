<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#40916C"/>
      <stop offset="100%" style="stop-color:#2D6A4F"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A373"/>
      <stop offset="100%" style="stop-color:#E9C46A"/>
    </linearGradient>
  </defs>
  <!-- 背景圆 -->
  <circle cx="100" cy="100" r="90" fill="#2D6A4F" opacity="0.08"/>
  <circle cx="100" cy="100" r="85" fill="none" stroke="#2D6A4F" stroke-width="3"/>
  
  <!-- 盾牌外形 -->
  <path d="M100,40 L150,65 L150,115 Q150,145 100,165 Q50,145 50,115 L50,65 Z" 
        fill="url(#shieldGrad)" stroke="#2D6A4F" stroke-width="2"/>
  
  <!-- 盾牌内边框 -->
  <path d="M100,52 L140,72 L140,112 Q140,138 100,155 Q60,138 60,112 L60,72 Z" 
        fill="none" stroke="url(#goldGrad)" stroke-width="2"/>
  
  <!-- 眼睛 -->
  <g transform="translate(100,100)">
    <!-- 眼眶 -->
    <ellipse cx="0" cy="0" rx="28" ry="18" fill="none" stroke="#D4A373" stroke-width="2.5"/>
    <!-- 瞳孔 -->
    <circle cx="0" cy="0" r="10" fill="#D4A373"/>
    <!-- 瞳孔高光 -->
    <circle cx="-3" cy="-3" r="3" fill="white" opacity="0.8"/>
    <circle cx="4" cy="2" r="1.5" fill="white" opacity="0.5"/>
  </g>
  
  <!-- 盾牌装饰线 -->
  <g stroke="url(#goldGrad)" stroke-width="1.5" fill="none" opacity="0.5">
    <path d="M70,80 Q100,70 130,80"/>
    <path d="M70,125 Q100,135 130,125"/>
  </g>
  
  <!-- 底部文字 -->
  <text x="100" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2D6A4F">守护者</text>
</svg>