<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B4965"/>
      <stop offset="100%" style="stop-color:#5FA8D3"/>
    </linearGradient>
  </defs>
  <!-- 背景圆 -->
  <circle cx="100" cy="100" r="90" fill="#1B4965" opacity="0.08"/>
  <circle cx="100" cy="100" r="85" fill="none" stroke="#1B4965" stroke-width="3"/>
  
  <!-- 大脑左半球 -->
  <g fill="url(#brainGrad)">
    <path d="M75,60 Q60,65 55,80 Q50,95 55,110 Q60,125 75,130 Q85,135 90,125 Q95,115 95,100 Q95,85 90,75 Q85,65 75,60Z"/>
    <!-- 大脑沟回 -->
    <path d="M70,75 Q65,85 70,95" fill="none" stroke="#1B4965" stroke-width="2" opacity="0.3"/>
    <path d="M65,100 Q60,110 70,118" fill="none" stroke="#1B4965" stroke-width="2" opacity="0.3"/>
  </g>
  
  <!-- 大脑右半球 -->
  <g fill="#5FA8D3">
    <path d="M125,60 Q140,65 145,80 Q150,95 145,110 Q140,125 125,130 Q115,135 110,125 Q105,115 105,100 Q105,85 110,75 Q115,65 125,60Z"/>
    <!-- 大脑沟回 -->
    <path d="M130,75 Q135,85 130,95" fill="none" stroke="#1B4965" stroke-width="2" opacity="0.3"/>
    <path d="M135,100 Q140,110 130,118" fill="none" stroke="#1B4965" stroke-width="2" opacity="0.3"/>
  </g>
  
  <!-- 神经连接 -->
  <g stroke="#5FA8D3" stroke-width="1.5" fill="none" opacity="0.6">
    <path d="M80,80 Q100,75 120,80"/>
    <path d="M75,100 Q100,95 125,100"/>
    <path d="M80,120 Q100,115 120,120"/>
    <circle cx="100" cy="77" r="3" fill="#5FA8D3"/>
    <circle cx="100" cy="97" r="3" fill="#5FA8D3"/>
    <circle cx="100" cy="117" r="3" fill="#5FA8D3"/>
  </g>
  
  <!-- 灯泡光环 -->
  <g stroke="#FFD700" stroke-width="2" fill="none" opacity="0.7">
    <path d="M100,35 L100,45"/>
    <path d="M130,50 L122,57"/>
    <path d="M70,50 L78,57"/>
  </g>
  
  <!-- 底部文字 -->
  <text x="100" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1B4965">智囊团</text>
</svg>