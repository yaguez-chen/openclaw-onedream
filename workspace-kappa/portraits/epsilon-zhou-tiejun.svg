  <path d="M95 128 L97 127" stroke="#C09060" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <path d="M93 132 L96 131" stroke="#C09060" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  
