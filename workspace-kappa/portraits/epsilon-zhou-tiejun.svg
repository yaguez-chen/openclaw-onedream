  <circle cx="120" cy="72" r="1" fill="#2A2A2A" opacity="0.3"/>
  <circle cx="135" cy="73" r="1" fill="#2A2A2A" opacity="0.3"/>
  <circle cx="148" cy="78" r="1" fill="#2A2A2A" opacity="0.3"/>
  <circle cx="115" cy="68" r="1" fill="#2A2A2A" opacity="0.3"/>
  <circle cx="140" cy="68" r="1" fill="#2A2A2A" opacity="0.3"/>
  
  <!-- Ears -->
  <ellipse cx="88" cy="118" rx="6" ry="10" fill="#C89870"/>
  <ellipse cx="168" cy="118" rx="6" ry="10" fill="#C89870"/>
  
  <!-- Eyes - sharp, intense, watchful -->
  <ellipse cx="112" cy="112" rx="7" ry="7" fill="white"/>
  <ellipse cx="144" cy="112" rx="7" ry="7" fill="white"/>
  <circle cx="112" cy="113" r="5" fill="#1A1A2E"/>
  <circle cx="144" cy="113" r="5" fill="#1A1A2E"/>
  <circle cx="113" cy="111" r="2" fill="white"/>
  <circle cx="145" cy="111" r="2" fill="white"/>
  <!-- Intense eyebrows - thick, straight, slightly lowered -->
  <path d="M100 100 Q108 96 120 99" fill="none" stroke="#1A1A1A" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M136 99 Q148 96 156 100" fill="none" stroke="#1A1A1A" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Slight frown lines -->
  <path d="M100 99 Q98 101 98 104" fill="none" stroke="#C09060" stroke-width="1" opacity="0.4"/>
  <path d="M156 99 Q158 101 158 104" fill="none" stroke="#C09060" stroke-width="1" opacity="0.4"/>
  
  <!-- Nose - broad, strong -->
  <path d="M128 115 L124 128 Q126 132 128 132 Q130 132 132 128" fill="none" stroke="#B8885A" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Mouth - firm, straight, no-nonsense -->
  <line x1="116" y1="140" x2="140" y2="140" stroke="#A07050" stroke-width="2.5" stroke-linecap="round"/>
