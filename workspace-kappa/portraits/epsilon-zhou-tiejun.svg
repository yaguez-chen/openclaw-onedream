  <circle cx="128" cy="128" r="120" fill="#D8D8D8" opacity="0.4"/>
  
  <!-- Body / Dark tactical jacket -->
  <path d="M56 256 Q56 188 78 172 L100 162 Q128 152 156 162 L178 172 Q200 188 200 256 Z" fill="#1A1A2E"/>
  <path d="M88 256 Q88 198 100 182 L112 175 Q128 170 144 175 L156 182 Q168 198 168 256 Z" fill="#252540"/>
  <!-- Jacket collar - high, military style -->
