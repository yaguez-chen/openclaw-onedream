  <path d="M116 140 Q114 142 116 143" fill="none" stroke="#A07050" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M140 140 Q142 142 140 143" fill="none" stroke="#A07050" stroke-width="1.5" stroke-linecap="round"/>
  
