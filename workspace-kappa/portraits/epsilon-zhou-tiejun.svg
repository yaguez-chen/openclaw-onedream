  <path d="M104 145 Q110 147 116 144" fill="none" stroke="#C09060" stroke-width="0.8" opacity="0.3"/>
  <path d="M140 144 Q146 147 152 145" fill="none" stroke="#C09060" stroke-width="0.8" opacity="0.3"/>
  
  <!-- Label -->
  <rect x="78" y="240" width="100" height="14" rx="7" fill="#1A1A2E" opacity="0.85"/>
  <text x="128" y="250" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white" font-weight="bold">周铁军 · Epsilon 🛡️</text>
